<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Formulário de contato para envio de mensagens."
    />
    <meta name="author" content="Seu Nome" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap"
      rel="preload"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript
      ><link
        href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap"
        rel="stylesheet"
    /></noscript>
    <link href="css/style.css" rel="stylesheet" />
    <title>Formulário de Contato</title>
  </head>
  <body>
    <div class="form">
      <img src="images/logo.jpg" alt="Logo do formulário de contato" />
      <form action="processar_formulario.php" method="post" id="contactForm">
        <fieldset>
          <legend>Contato</legend>
          <label for="nome">Nome:</label>
          <input
            type="text"
            id="nome"
            name="nome"
            placeholder="Seu nome..."
            autocomplete="name"
            required
          />
          <div class="error" id="nomeError" aria-live="polite"></div>
          <label for="email">E-mail:</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Seu e-mail..."
            autocomplete="email"
            required
          />
          <div class="error" id="emailError" aria-live="polite"></div>
          <label for="mensagem">Mensagem:</label>
          <textarea
            id="mensagem"
            name="mensagem"
            placeholder="Sua mensagem..."
            required
          ></textarea>
          <div class="error" id="mensagemError" aria-live="polite"></div>
          <input type="submit" value="Enviar!" />
        </fieldset>
      </form>
    </div>
    <script>
      document
        .getElementById("contactForm")
        .addEventListener("submit", function (event) {
          let isValid = true;
          const nome = document.getElementById("nome").value.trim();
          const email = document.getElementById("email").value.trim();
          const mensagem = document.getElementById("mensagem").value.trim();
          const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

          document.getElementById("nomeError").textContent = "";
          document.getElementById("emailError").textContent = "";
          document.getElementById("mensagemError").textContent = "";

          if (!nome) {
            document.getElementById("nomeError").textContent =
              "Nome é obrigatório.";
            isValid = false;
          }
          if (!email) {
            document.getElementById("emailError").textContent =
              "E-mail é obrigatório.";
            isValid = false;
          } else if (!emailRegex.test(email)) {
            document.getElementById("emailError").textContent =
              "E-mail inválido.";
            isValid = false;
          }
          if (!mensagem) {
            document.getElementById("mensagemError").textContent =
              "Mensagem é obrigatória.";
            isValid = false;
          }

          if (!isValid) {
            event.preventDefault();
          }
        });
    </script>
  </body>
</html>
